<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>日報作成</title>
    <!-- 外部CSS読み込み -->
    <link rel="stylesheet" th:href="@{/css/addReport.css}">
    <!-- Flatpickr CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body>
    <div class="container">
        <h1>日報作成</h1>
        <form action="#" method="post">

            <label>開始日時</label>
            <input type="text" id="startDate" name="startTime" placeholder="開始日時を選択">

            <label>終了日時</label>
            <input type="text" id="endDate" name="endTime" placeholder="終了日時を選択">

            <label>タイトル</label>
            <input type="text" name="title" placeholder="例：午前中は会議、午後は開発">

            <label>業務内容</label>
            <textarea name="content" rows="4" placeholder="今日やった作業内容を記入"></textarea>

            <label>課題・問題点</label>
            <textarea name="issues" rows="2" placeholder="発生した課題や問題点"></textarea>

            <label>コメント</label>
            <textarea name="comment" rows="2" placeholder="上司やチームへの補足"></textarea>

            <div class="button-group">
                <a href="/">キャンセル</a>
                <button type="submit">送信</button>
            </div>
        </form>
    </div>

    <!-- Flatpickr JS -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script>
        flatpickr("#startDate", {
            enableTime: true,
            dateFormat: "Y-m-d H:i",
        });
        flatpickr("#endDate", {
            enableTime: true,
            dateFormat: "Y-m-d H:i",
        });
    </script>
</body>
</html>
